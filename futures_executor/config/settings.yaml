broker:
  host: 127.0.0.1
  port: 4002
  client_id: 1
  readonly: false
  timeout: 30

rfactory_path: /Users/acess/projects/R-factory

instruments:
  - symbol: MNQ
    exchange: CME
    portfolio_symbol: NQ
    multiplier: 2.0        # $2 per point (Micro NQ)
    margin: 2100
  - symbol: MCL
    exchange: NYMEX
    portfolio_symbol: CL
    multiplier: 100.0      # $100 per point (Micro CL)
    margin: 1000
  - symbol: MES
    exchange: CME
    portfolio_symbol: ES
    multiplier: 5.0        # $5 per point (Micro ES)
    margin: 1500
  - symbol: MGC
    exchange: COMEX
    portfolio_symbol: GC
    multiplier: 10.0       # $10 per point (Micro GC)
    margin: 800
  - symbol: ZN
    exchange: CBOT
    multiplier: 1000.0     # $1000 per point (10-Year Note)
    margin: 2000

roll:
  days_before_expiry: 7
  hard_deadline_days: 3
  min_next_volume: 1000
  merge_with_rebalance_window: 3

execution:
  portfolio_leverage: 10.0
  abs_threshold: 1        # min contract delta to trade (noise filter)
  rel_threshold: 0.15     # min % change vs current position to trade (15%)
  gross_exposure_cap: 5.0 # max Σ|sized_j|; proportional scale-down if exceeded (null = no cap)
  margin_cap: 0.8        # max fraction of equity usable for initial margin
  order_type: market

vol_target:
  enabled: true
  target_vol: 0.30
  vol_window: 60
  max_leverage: 10.0
  instrument_level: false  # V1: per-strategy vol targeting

data:
  lookback_bars: 500
  continuous_dir: data/continuous
  bar_history_dir: data/bars

safety:
  max_position_contracts: 10
  max_total_contracts: 30
  max_daily_turnover: 20
  kill_switch_file: .kill_switch
  heartbeat_timeout: 300

audit:
  db_path: data/audit.db

signal:
  account: "+37069693289"
  recipient: "+37069693181"
  enabled: true
  cli_path: /opt/homebrew/bin/signal-cli
