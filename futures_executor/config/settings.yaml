broker:
  host: 127.0.0.1
  port: 4002
  # 101 = futures-executor's daily cron. Avoids the 0/1 default range that
  # IBKR sample apps + many third-party tools collide on. forex-live's IBKR
  # data feed uses 102; onboard_account.sh probes use 1099 — distinct from
  # both. Pick a different value here only if you also rebase the others.
  client_id: 101
  readonly: false
  timeout: 30

rfactory_path: /Users/acess/projects/R-factory

instruments:
  - symbol: MCL
    exchange: NYMEX
    portfolio_symbol: CL
    multiplier: 100.0      # $100 per point (Micro CL)
    margin: 1000
  - symbol: MES
    exchange: CME
    portfolio_symbol: ES
    multiplier: 5.0        # $5 per point (Micro ES)
    margin: 1500
  - symbol: MGC
    exchange: COMEX
    portfolio_symbol: GC
    multiplier: 10.0       # $10 per point (Micro GC)
    margin: 800
    delivery_buffer_days: 14

roll:
  days_before_expiry: 7
  hard_deadline_days: 3
  min_next_volume: 1000
  merge_with_rebalance_window: 3

execution:
  # portfolio_leverage was 1.5 pre-refactor; folded into target_sleeve_vol below.
  # Kept as 1.0 vestigial multiplier for parity with forex-live's settings shape.
  portfolio_leverage: 1.0
  abs_threshold: 1        # min contract delta to trade (noise filter)
  rel_threshold: 0.15     # min % change vs current position to trade (15%)
  gross_exposure_cap: 5.0 # max Σ|sized_j|; proportional scale-down if exceeded (null = no cap)
  margin_cap: 0.8        # max fraction of equity usable for initial margin
  order_type: market

# Vol-targeting — post-leverage-refactor vocabulary (matches forex-live's
# settings.yaml::vol_target shape and R-factory's PortfolioConfig fields).
#
#   OLD: min(target_vol=0.30 / realized_vol, max_leverage=10) × portfolio_leverage=1.5
#   NEW: target_sleeve_vol=0.45 / max(realized_vol, vol_floor=0.045)
#
# In the NON-CAP-ENGAGED region (realized_vol > vol_floor), bit-for-bit
# identical (both formulas reduce to 0.45/realized_vol).
#
# In the CAP-ENGAGED region (realized_vol < vol_floor), the effective cap
# changes from old_max_leverage × old_portfolio_leverage = 15 to
# target_sleeve_vol / vol_floor = 10. This is the same 1.5× reduction
# forex-live's refactor produced (cap went from 50 to 10 there); kept for
# cross-repo consistency. ES/CL/GC realized vol is typically 0.15-0.30 so
# the cap rarely engages anyway.
vol_target:
  enabled: true
  target_sleeve_vol: 0.45
  vol_window: 60
  vol_floor: 0.045
  instrument_level: false  # V1: per-strategy vol targeting

data:
  lookback_bars: 500
  continuous_dir: data/continuous
  bar_history_dir: data/bars

safety:
  max_position_contracts: 100
  max_total_contracts: 300
  max_daily_turnover: 20
  kill_switch_file: .kill_switch
  heartbeat_timeout: 300

audit:
  db_path: data/audit.db

signal:
  account: "+37069693289"
  recipient: "+37069693181"
  enabled: true
  cli_path: /opt/homebrew/bin/signal-cli

monitor:
  enabled: true
  r_factory_artifacts_dir: /Users/acess/projects/R-factory/artifacts
  r_factory_data_dir: /Users/acess/projects/R-factory/data
  broker_id: ibkr-futures
