broker:
  host: 127.0.0.1
  port: 4002
  # 101 = futures-executor's daily cron. Avoids the 0/1 default range that
  # IBKR sample apps + many third-party tools collide on. forex-live's IBKR
  # data feed uses 102; onboard_account.sh probes use 1099 — distinct from
  # both. Pick a different value here only if you also rebase the others.
  client_id: 101
  readonly: false
  timeout: 30

rfactory_path: /Users/acess/projects/R-factory

instruments:
  - symbol: MCL
    exchange: NYMEX
    portfolio_symbol: CL
    multiplier: 100.0      # $100 per point (Micro CL)
    margin: 1000
  - symbol: MES
    exchange: CME
    portfolio_symbol: ES
    multiplier: 5.0        # $5 per point (Micro ES)
    margin: 1500
  - symbol: MGC
    exchange: COMEX
    portfolio_symbol: GC
    multiplier: 10.0       # $10 per point (Micro GC)
    margin: 800
    delivery_buffer_days: 14

roll:
  days_before_expiry: 7
  hard_deadline_days: 3
  min_next_volume: 1000
  merge_with_rebalance_window: 3

execution:
  # portfolio_leverage was 1.5 pre-refactor; folded into target_sleeve_vol below.
  # Kept as 1.0 vestigial multiplier for parity with forex-live's settings shape.
  portfolio_leverage: 1.0
  abs_threshold: 1        # min contract delta to trade (noise filter)
  rel_threshold: 0.15     # min % change vs current position to trade (15%)
  gross_exposure_cap: 5.0 # max Σ|sized_j|; proportional scale-down if exceeded (null = no cap)
  margin_cap: 0.8        # max fraction of equity usable for initial margin
  order_type: market

# Vol-targeting — aligned with the R-factory build that produced the
# currently-deployed strategies.yaml (knobs: target_sleeve_vol=0.4,
# vol_floor=0.03, gross_exposure_cap=5.0). Per-sleeve cap = 0.4/0.03 ≈ 13.3.
# When R-factory's build is re-run with different knobs and re-exported,
# update these values to match so live execution matches the regime under
# which strategies were selected and weights computed.
vol_target:
  enabled: true
  target_sleeve_vol: 0.4
  vol_window: 60
  vol_floor: 0.03
  instrument_level: false  # V1: per-strategy vol targeting

# Data — cmd_run_once reads R-factory's canonical parquet instead of
# fetching from IBKR directly. The cron sequence runs
# `data ingest-futures-ibkr --synthesize-eod` first (in run_daily.sh),
# so parquet has tonight's bar by the time run-once executes.
# See PLAN_FUTURES_OPTION2 (2026-05-05): unified market_data source
# eliminates the live/replay window-mismatch where futures-live's
# local ContinuousSeries (built from a lookback window) produced
# different signals than R-factory monitor's replay (full parquet).
data:
  # Legacy — no longer consumed by run-once after 2026-05-05.
  lookback_bars: 500
  continuous_dir: data/continuous
  bar_history_dir: data/bars
  # New (futures Option 2):
  parquet_set_name: futures_mini       # subdir under {monitor.r_factory_data_dir}/parquet/
  max_parquet_age_business_days: 1     # hard-refuse staler than this

safety:
  max_position_contracts: 100
  max_total_contracts: 300
  max_daily_turnover: 20
  kill_switch_file: .kill_switch
  heartbeat_timeout: 300
  # Capital controls v1: trip the kill switch automatically if today's loss
  # exceeds this %. forex_major calibration: worst historical day = -3.35%,
  # 5% is the smallest threshold not seen in 21 years of sim history.
  # futures_mini's own xray hasn't been generated yet; recalibrate before
  # futures real-money launch. ≤0 disables.
  daily_loss_circuit_pct: 5.0
  reference_equity_file: data/reference_equity.json

audit:
  db_path: data/audit.db

signal:
  account: "+37069693289"
  recipient: "+37069693181"
  enabled: true
  cli_path: /opt/homebrew/bin/signal-cli

monitor:
  enabled: true
  r_factory_artifacts_dir: /Users/acess/projects/R-factory/artifacts
  r_factory_data_dir: /Users/acess/projects/R-factory/data
  broker_id: ibkr-futures
